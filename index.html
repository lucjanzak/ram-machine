<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>RAM machine emulator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div>
      <h1>RAM machine emulator</h1>
    </div>
    <div>
      Author: Lucjan Żak
    </div>
  </header>
  <nav>
    <div class="nav-buttons">
      <button class="nav-button nav-button-auto">Załaduj</button>
    </div>

    <div class="nav-buttons">
      <button class="nav-button nav-button-auto"
        onclick="RAMMachine.machine.loadProgramAndReset(RAMMachine.examplePrograms.PARSING_EXAMPLE)">
        Load PARSING_EXAMPLE
      </button>
      <button class="nav-button nav-button-auto"
        onclick="RAMMachine.machine.loadProgramAndReset(RAMMachine.examplePrograms.NORMAL_EXAMPLE)">
        Load NORMAL_EXAMPLE
      </button>
      <button class="nav-button nav-button-auto"
        onclick="RAMMachine.machine.loadProgramAndReset(RAMMachine.examplePrograms.PARSING_ERROR_EXAMPLE)">
        Load PARSING_ERROR_EXAMPLE
      </button>
    </div>
  </nav>
  <main>
    <section>
      Statistics:
      <table>
        <thead>
          <td>instruction</td>
          <td>count</td>
        </thead>
        <tbody id="stats"></tbody>
      </table>
    </section>
    <section>
      listing:
      <table id="program-listing-table">
        <colgroup>
          <col style="width: 100px;">
          <col style="width: 240px;">
          <col style="width: 180px;">
          <col style="width: 400px;">
        </colgroup>
        <thead>
          <tr>
            <th>Line</th>
            <th>Label</th>
            <th>Instruction</th>
            <th>Comment</th>
          </tr>
        </thead>
        <tbody id="program-listing">

        </tbody>
      </table>
    </section>
  </main>
  <footer>
    <hr>
    Author: Lucjan Żak
    <br>
    License: <a href="./LICENSE.txt" target="_blank">GNU General Public License</a>
    <br>
    Source code: <a href="https://github.com/lucjanzak/ram-machine" target="_blank">GitHub</a>
    <br>
    2026
  </footer>
  <template id="instruction-tile">
    <tr>
      <td id="line-number" class="tile-part-line-number"></td>
      <td id="labels" class="tile-part-labels"></td>
      <td id="instruction"></td>
      <td id="comment" class="tile-part-comment"></td>
    </tr>
  </template>
  <template id="comment-tile">
    <tr>
      <td></td>
      <td></td>
      <td id="comment" colspan="2" class="tile-part-comment present"></td>
    </tr>
  </template>
  <script src="out/app.js" type="module"></script>
</body>

</html>
