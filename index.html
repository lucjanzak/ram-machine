<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Maszyna RAM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div>
    Hello world
  </div>
  listing:
  <table id="program-listing-table">
    <tbody id="program-listing">

    </tbody>
  </table>
  <hr>
  <footer>
    Autor: Lucjan Żak
  </footer>
  <template id="program-listing-header">
    <tr>
      <th>#</th>
      <td>Label</td>
      <td>Instruction</td>
      <td>Comment</td>
    </tr>
  </template>
  <template id="instruction-tile">
    <tr>
      <td>#</td>
      <td id="labels" class="tile-part-labels"></td>
      <td id="instruction"></td>
      <td id="comment" class="tile-part-comment"></td>
    </tr>
  </template>
  <template id="comment-tile">
    <tr>
      <td></td>
      <td></td>
      <td id="comment" colspan="2" class="tile-part-comment present"></td>
    </tr>
  </template>
  <script src="out/rammachine.js"></script>
</body>

</html>
